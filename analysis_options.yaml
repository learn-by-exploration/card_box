# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - third_party/**

  # language.strict-casts / strict-inference / strict-raw-types are NOT
  # enabled at build time. card_box's existing code has ~30
  # inference-failure warnings and 1 raw-type warning that the strict
  # language flags catch; turning these on would block the build until
  # a separate refactor PR fixes them. The board_box strictness is the
  # aspirational target; we get there incrementally.

linter:
  # Three lints are enabled as the "load-bearing" contract for card_box.
  # These are the rules where one missed call is a real bug, not a style nit:
  #
  #   - avoid_print               : print() is banned. Use debugPrint behind
  #                                 kDebugMode. Stops accidental shipping of
  #                                 debug output.
  #   - unawaited_futures         : every Future is awaited or wrapped in
  #                                 unawaited(). The card_database writes are
  #                                 an asynchronous critical path; missing an
  #                                 await is the easiest way to ship a dropped
  #                                 write.
  #   - always_use_package_imports: package:common_games/... imports only.
  #                                 No relative ../ imports. Keeps the import
  #                                 surface consistent with board_box.
  #
  # The full board_box lint set (18 lints) is the *aspirational* target. The
  # remaining rules (prefer_const_*, prefer_single_quotes, etc.) are enforced
  # code-review time, not build time, until card_box's existing code is
  # swept for compliance. The full list lives in
  # board_box/docs/engineering/flutter-dart-style.md and the rationale
  # for each rule is documented there.
  rules:
    - avoid_print
    - unawaited_futures
    - always_use_package_imports
