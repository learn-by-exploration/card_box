name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

# Minimal default; deploy-pages job overrides to pages:write + id-token:write
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Analyze & Test  (every push / PR)
  # ─────────────────────────────────────────────────────────
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        # Scope to lib/ and test/ — the vendored third_party/
        # packages (mobile_scanner, nfc_manager) are kept
        # byte-identical to upstream on purpose, so they are
        # excluded from the format check.
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────
  # 2. Build debug APK  (every push — quick sanity check)
  # ─────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # 3. Build release AAB  (main branch only)
  #    Requires GitHub Secrets:
  #      ANDROID_KEYSTORE_BASE64  — base64 of upload-keystore.jks
  #      ANDROID_KEY_ALIAS        — upload
  #      ANDROID_KEY_PASSWORD     — key password
  #      ANDROID_STORE_PASSWORD   — store password
  #    The job fails fast with a clear "missing secret" error
  #    if any of the four are not configured.
  # ─────────────────────────────────────────────────────────
  build-android-release:
    name: Build Android Release (AAB)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_STORE_PASSWORD \
            ANDROID_KEY_PASSWORD \
            ANDROID_KEY_ALIAS
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > android/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # 4. Build Web + upload Pages artifact  (main branch only)
  #    Live URL: https://learn-by-exploration.github.io/CardBox/
  #    Optional static docs (privacy-policy.html, data-safety.html)
  #    are merged into the Flutter web output if they exist in
  #    docs/. Card Box doesn't ship them yet; the copy step is
  #    skipped silently when the files are absent.
  # ─────────────────────────────────────────────────────────
  build-web:
    name: Build Web & Upload Pages Artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /CardBox/

      - name: Copy static docs into web output
        run: |
          cp docs/privacy-policy.html build/web/privacy-policy.html
          cp docs/data-safety.html    build/web/data-safety.html

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ─────────────────────────────────────────────────────────
  # 5. Deploy to GitHub Pages  (main branch only)
  #    Requires: Settings → Pages → Source = GitHub Actions
  # ─────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────
  # 6. Build iOS (no-codesign)  (main branch only)
  #    Verifies the iOS target compiles cleanly.
  #    Full App Store distribution requires a paid Apple
  #    developer account and signing certs — set up separately.
  # ─────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no-codesign)
        run: flutter build ios --no-codesign --release
